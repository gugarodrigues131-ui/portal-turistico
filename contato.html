<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contate-nos</title>
    <link rel="stylesheet" href="css/p1.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>

<body class="cont">

    <header class="retorno">
            <div><a href="index.html">↩</a></div>
    </header>
    
<div class="container">

    <form>
        <h2 class="let">Cadastro completo</h2>

        <div class="row">
            <div class="field">
                <label>Nome:</label>
                <input type="text"  placeholder="insira seu nome">
            </div>

            <div class="field">
                <label>Sobrenome:</label>
                <input type="text" placeholder="Insira seu sobrenome">
            </div>

        </div>

        <!-- email e senha -->
         <div class="row">
            <div class="field">
                <label >E-mail:</label>
                <input type="email" placeholder="Insira seu e-mail">
            </div>
            
            <div class="field"> 
                <label>Senha:</label>
                <input type="password" placeholder="Insira sua senha">
           </div>
         </div>


         <!-- numeros -->
          <div class="row">
            <div class="field">
                <label>Idade:</label>
                <input type="number" min="0" placeholder="Insira a idade">
            </div>

            <div class="field">
                <label>Telefone:</label>
                <input type="tel" placeholder="Insira seu telefone">
            </div>
          </div>

          <!-- data -->
           <div class="row">

             <div class="field">
                <label>Data</label>
                <input type="date">
             </div>

             <div class="field">
                <label>Horario preferido</label>
                <input type="time">
             </div>

           </div>

           <!-- select -->
            <div class="field">
                <label>Estado</label>
                <select>
                    <option>MA</option>
                    <option>RJ</option>
                    <option>AM</option>
                </select>
            </div>

            <!-- radio -->
             <div class="field">
                <label >Genero</label>
                <div class="row">
                    <label> <input type="radio" name="Genero">Masculino</label>
                    <label> <input type="radio" name="Genero">Feminino</label>
                    <label> <input type="radio" name="Genero">Prefiro nao informar</label>
                </div>
             </div>

   <!-- botoes -->
    <div class="actions">
        <button type="reset" class="reset">Limpar</button>
        <button type="submit" class="submit"><a href="thanks.html">Enviar</a></button>
    </div>

 </form>
</div>

<footer>
     <div class="rodape">
    <p>2026 Brasil encantado  |</p>
    <p>Gustavo Alves, Kaua Bandeira, Davi Henrique  |</p>
    <p><a href="contato.html">Contato</a></p>

</footer>


</body>
</html>
